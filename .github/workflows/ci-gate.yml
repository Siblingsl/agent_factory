name: ci-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Gate
        run: |
          python agent_factory_mvp/ci/run_gates.py --strict
